services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: theotank-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: theotank
      POSTGRES_PASSWORD: theotank_local
      POSTGRES_DB: theotank
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U theotank"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: theotank-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_API_CORS_ALLOW_ORIGIN: "http://localhost:5173"
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/theotank &&
      mc mb --ignore-existing local/theotank-public &&
      mc anonymous set download local/theotank-public &&
      echo 'Buckets ready'
      "

  worker:
    build:
      context: .
      dockerfile: packages/worker/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://theotank:theotank_local@postgres:5432/theotank
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: theotank
      S3_PUBLIC_BUCKET: theotank-public
      S3_PUBLIC_ASSET_URL: http://minio:9000/theotank-public
      WORKER_ID: worker-docker-1
      WORKER_POLL_INTERVAL_MS: 2000
      WORKER_MAX_CONCURRENCY: 3
    restart: unless-stopped

  cron:
    build:
      context: .
      dockerfile: packages/cron/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://theotank:theotank_local@postgres:5432/theotank
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: theotank
      PORT: 3003
    restart: unless-stopped

volumes:
  pgdata:
  miniodata:
